baseURL: "https://liyongzheng666.github.io/"
languageCode: "zh-CN"
defaultContentLanguage: "zh-cn"
title: "Ally 的个人博客"
theme: "hextra"
hasCJKLanguage: true
enableRobotsTXT: true

menu:
  main:
    - name: 首页
      pageRef: /
      weight: 1
    - name: 项目
      pageRef: /projects
      weight: 2
    - name: 博客
      pageRef: /blog
      weight: 3
    - name: 关于
      pageRef: /about
      weight: 4
    - name: 搜索
      weight: 5
      params:
        type: search
    - name: GitHub
      url: "https://github.com/liyongzheng666"
      weight: 6
      params:
        icon: github

params:
  description: "记录技术、写作、项目与静态网页作品。"
  navbar:
    displayTitle: true
    displayLogo: false
  theme:
    default: system
    displayToggle: true
  search:
    enable: true
    type: flexsearch
  blog:
    list:
      displayTags: true
      sortBy: date
      sortOrder: desc
    article:
      displayPagination: true
  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: true

markup:
  goldmark:
    renderer:
      unsafe: true
